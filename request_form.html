<section class="hero">
    <h1>Request a Custom Tool</h1>
    <p>Tell me what you need — I’ll build it.</p>

<section class="top-tools">
    <h2>🛠 Custom Tool Request Form</h2>

    <div class="form-container">

        <form action="https://formspree.io/f/mqkrjzlv" method="POST">

            <div class="form-row">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Your Email</label>
                    <input type="email" name="email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Tool Name / Title</label>
                <input type="text" name="tool_title" placeholder="e.g., Invoice Generator, Data Cleaner" required>
            </div>

            <div class="form-group">
                <label>Describe the Tool You Need</label>
                <textarea name="message" rows="7" placeholder="Explain what the tool should do, features, inputs, outputs…" required></textarea>
            </div>

            <div class="form-group">
                <label>Deadline (Optional)</label>
                <input type="text" name="deadline" placeholder="e.g., 1 week, ASAP, no deadline">
            </div>

            <button type="submit" class="btn" style="margin-top: 10px;">Submit Request</button>

        </form>

    </div>
</section>
