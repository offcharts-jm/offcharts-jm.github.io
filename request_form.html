    <script>

    <style>
        :root {
            --bg-dark: #020617;
            --card-dark: #0f172a;
            --accent: #60a5fa;
            --text-dark: #e5e7eb;
            --muted-dark: #94a3b8;

            --bg-light: #f9fafb;
            --card-light: #ffffff;
            --text-light: #020617;
            --muted-light: #6b7280;
        }

        html[data-theme="dark"] {
            --bg: var(--bg-dark);
            --card: var(--card-dark);
            --text: var(--text-dark);
            --muted: var(--muted-dark);
        }

        html[data-theme="light"] {
            --bg: var(--bg-light);
            --card: var(--card-light);
            --text: var(--text-light);
            --muted: var(--muted-light);
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.25s ease, color 0.25s ease;
        }

        nav {
            background-color: rgba(15, 23, 42, 0.95);
            padding: 14px 20px;
            display: flex;
            justify-content: center;
            gap: 24px;
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 15px;
            text-transform: uppercase;
        }

        nav a:hover {
            color: var(--accent);
        }

        .nav-right {
            position: absolute;
            right: 20px;
            top: 10px;
        }

        .theme-toggle {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        h1 {
            font-size: 34px;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 40px;
        }

        form {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
        }

        textarea {
            height: 140px;

        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: var(--muted);
            border-top: 1px solid rgba(148, 163, 184, 0.25);

<script>
    (function () {
        const root = document.documentElement;
        const toggle = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');

        function setTheme(theme) {
            root.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            icon.textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        const saved = localStorage.getItem('theme');
        setTheme(saved || 'dark');

        toggle.addEventListener('click', () => {
            const current = root.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
    })();
</script>

<!-- FULL EVENT TRACKING -->
<script>
document.querySelectorAll('a[href^="http"]').forEach(link => {
  link.addEventListener('click', () => {
    gtag('event', 'outbound_click', { event_label: link.href });
  });
});

document.querySelectorAll('a[href$=".zip"], a[href$=".exe"]').forEach(download => {
  download.addEventListener('click', () => {
    gtag('event', 'download', { event_label: download.href });
  });
});

window.addEventListener('scroll', () => {
  let scrollPercent = Math.round(
    (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100
  );
  if (scrollPercent > 25) gtag('event', 'scroll_25');
  if (scrollPercent > 50) gtag('event', 'scroll_50');
  if (scrollPercent > 75) gtag('event', 'scroll_75');
  if (scrollPercent > 90) gtag('event', 'scroll_90');
});
</script>
